services:

  # ======================
  # BASE DE DATOS CITAS
  # ======================
  db_citas:
    image: postgres:15
    container_name: db_citas
    restart: always
    environment:
      POSTGRES_DB: citas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - citas_data:/var/lib/postgresql/data
      - ./database/citas/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ======================
  # BASE DE DATOS INVENTARIO
  # ======================
  db_inventario:
    image: postgres:15
    container_name: db_inventario
    restart: always
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - inventario_data:/var/lib/postgresql/data
      - ./database/inventario/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ======================
  # BASE DE DATOS USUARIOS
  # ======================
  db_usuarios:
    image: postgres:15
    container_name: db_usuarios
    restart: always
    environment:
      POSTGRES_DB: usuarios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - usuarios_data:/var/lib/postgresql/data
      - ./database/usuarios/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ======================
  # BASE DE DATOS HISTORIAL
  # ======================
  db_historial:
    image: postgres:15
    container_name: db_historial
    restart: always
    environment:
      POSTGRES_DB: historial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - historial_data:/var/lib/postgresql/data
      - ./database/historial/init.sql:/docker-entrypoint-initdb.d/init.sql


  # ======================
  # BASE DE DATOS DIAGNOSTICO
  # ======================
  db_diagnostico:
    image: postgres:15
    container_name: db_diagnostico
    restart: always
    environment:
      POSTGRES_DB: diagnostico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - diagnostico_data:/var/lib/postgresql/data



  # ======================
  # BASE DE DATOS FACTURACION
  # ======================
  db_facturacion:
    image: postgres:15
    container_name: db_facturacion
    restart: always
    environment:
      POSTGRES_DB: facturacion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - facturacion_data:/var/lib/postgresql/data



  # ======================
  # MICROSERVICIO CITAS
  # ======================
  citas_service:
    build: ./backend/microservicio_citas
    container_name: citas_service
    ports:
      - "8000:8000"
    depends_on:
      - db_citas
    environment:
      DB_HOST: db_citas
      DB_PORT: 5432
      DB_NAME: citas
      DB_USER: postgres
      DB_PASSWORD: postgres

  # ======================
  # MICROSERVICIO INVENTARIO
  # ======================
  inventario_service:
    build: ./backend/microservicio_inventario
    container_name: inventario_service
    ports:
      - "8004:8000"
    depends_on:
      - db_inventario
    environment:
      DB_HOST: db_inventario
      DB_PORT: 5432
      DB_NAME: inventario
      DB_USER: postgres
      DB_PASSWORD: postgres

  # ======================
  # MICROSERVICIO USUARIOS
  # ======================
  usuarios_service:
    build: ./backend/microservicio_usuarios
    container_name: usuarios_service
    ports:
      - "8002:8000"
    depends_on:
      - db_usuarios
    environment:
      DB_HOST: db_usuarios
      DB_PORT: 5432
      DB_NAME: usuarios
      DB_USER: postgres
      DB_PASSWORD: postgres

  # ======================
  # MICROSERVICIO HISTORIAL
  # ======================
  historial_service:
    build: ./backend/microservicio_historial
    container_name: historial_service
    ports:
      - "8003:8000"
    depends_on:
      - db_historial
    environment:
      DB_HOST: db_historial
      DB_PORT: 5432
      DB_NAME: historial
      DB_USER: postgres
      DB_PASSWORD: postgres


  # ======================
  # MICROSERVICIO DIAGNOSTICO
  # ======================
  diagnostico_service:
    build: ./backend/microservicio_diagnostico
    container_name: diagnostico_service
    ports:
      - "8005:8000"
    depends_on:
      - db_diagnostico
    environment:
      DB_HOST: db_diagnostico
      DB_PORT: 5432
      DB_NAME: diagnostico
      DB_USER: postgres
      DB_PASSWORD: postgres



  # ======================
  # MICROSERVICIO FACTURACION
  # ======================
  facturacion_service:
    build: ./backend/microservicio_facturacion
    container_name: facturacion_service
    ports:
      - "8006:8000"
    depends_on:
      - db_facturacion
    environment:
      DB_HOST: db_facturacion
      DB_PORT: 5432
      DB_NAME: facturacion
      DB_USER: postgres
      DB_PASSWORD: postgres



# ======================
# VOLUMENES (CLAVE 🔥)
# ======================
volumes:
  citas_data:
  inventario_data:
  usuarios_data:
  historial_data:
  diagnostico_data:
  facturacion_data: