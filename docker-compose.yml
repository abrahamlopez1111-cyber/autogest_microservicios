services:
  postgres:
    image: postgres:15
    container_name: autogest_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autogest

  citas_service:
    build: ./backend/microservicio_citas   
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  clientes_service:
    build: ./backend/microservicio_clientes   
    ports:
      - "8001:8000"
    depends_on:
      - postgres